name: Build & Deploy Docs

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:         # Added: Build will now check every PR
    branches: [main]
  workflow_dispatch:

jobs:
  # JOB 1: Build and Verify (Runs on PRs and Pushes)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
            activate-environment: vrui
            environment-file: environment.yml
            miniforge-version: latest
            auto-activate: false

      - name: Clone and stage external docs
        shell: bash -el {0}
        run: bash scripts/clone_docs.sh

      - name: Generate zensical config
        shell: bash -el {0}
        run: python scripts/generate_zensical.py

      - name: Build Zensical Docs
        shell: bash -el {0}
        run: zensical build --config-file zensical.generated.toml --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  # JOB 2: Deploy (Only runs on main after Build succeeds)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4