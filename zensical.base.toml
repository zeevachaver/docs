[project]
    docs_dir         = "docs"
    repo_name        = "vrui-vr"
    repo_url         = "https://github.com/vrui-vr"
    site_description = "Open Source xR for Collaborative Scientific Investigation of 3D Data"
    site_name        = "Vrui - Open Source xR for Collaborative Scientific Investigation of 3D Data"
    site_url         = "https://vrui-vr.github.io/"

    nav = [
        { "Home" = [
            "index.md",
            { "Governance" = "governance.md" },
            { "Contributing to Vrui" = "contributing.md" },
            { "Code of Conduct" = "code_of_conduct.md" },
        ] },
    ]

    [project.plugins]
        "gh-admonitions" = {} # convert GitHub style alerts (> note) to standard mkdocs admonitions (!!! note)
        "include-markdown" = {} # include text from another md file
        search           = {}

    # https://facelessuser.github.io/pymdown-extensions
    [project.markdown_extensions]
        abbr                    = {}
        admonition              = {}                                           # https://3os.org/utilities/markdown-cheatsheet/admonition/#supported-types
        footnotes               = {}
        "pymdownx.arithmatex"   = { generic = true }
        "pymdownx.details"      = {}
        "pymdownx.highlight"    = {}
        "pymdownx.inlinehilite" = {}
        "pymdownx.keys"         = {}
        "pymdownx.superfences"  = {}
        "pymdownx.fancylists"   = {}
        "pymdownx.saneheaders"  = {}
        "pymdownx.tabbed"       = {} # todo update things with options to tabbed
        "pymdownx.smartsymbols" = {}
        tables                  = {}
        toc                     = { title = "On this page", permalink = true }

    [project.theme]
        custom_dir = "overrides"
        features = [
            "announce.dismiss",
            "content.code.annotate",
            "content.code.copy",
            "content.tooltips",
            "navigation.footer",
            "navigation.indexes",
            "navigation.instant.preview",
            "navigation.path",
            "navigation.sections",
            "navigation.tabs",
            "navigation.tabs.sticky",
            "navigation.top",
            "search.highlight",
            "search.suggest",
            "search.share",
            "toc.follow",
        ]
        font = false # prevents typefaces from being loaded from Google Fonts to adhere to data privacy regulations
        icon = { repo = "fontawesome/brands/github" }

        # Palette toggle for automatic mode
        [[project.theme.palette]]
            media       = "(prefers-color-scheme)"
            toggle.icon = "lucide/sun-moon"
            toggle.name = "Switch to light mode"
            primary = "deep orange"
            accent = "blue"

        # Palette toggle for light mode
        [[project.theme.palette]]
            media       = "(prefers-color-scheme: light)"
            scheme      = "default"
            toggle.icon = "lucide/sun"
            toggle.name = "Switch to dark mode"
            primary = "deep orange"
            accent = "blue"

        # Palette toggle for dark mode
        [[project.theme.palette]]
            media       = "(prefers-color-scheme: dark)"
            scheme      = "slate"
            toggle.icon = "lucide/moon"
            toggle.name = "Switch to system preference"
            primary = "deep orange"
            accent = "blue"

    [[project.extra.social]]
        icon = "material/gavel"
        link = "/governance"
        name = "Governance"

    [[project.extra.social]]
        icon = "material/handshake"
        link = "/contributing"
        name = "Contributing to Vrui"

    [[project.extra.social]]
        icon = "material/account-heart"
        link = "/code_of_conduct"
        name = "Code of Conduct"

        extra_javascript = [
            "javascripts/config.js",
            "https://polyfill.io/v3/polyfill.min.js?features=es6",
            "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js",
        ]
